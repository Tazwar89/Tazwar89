name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Basic Configuration
          user: ${{ github.repository_owner }}
          template: classic
          config_timezone: America/Toronto
          base: header, repositories
          
          # Languages
          plugin_languages: no
          
          # Achievements
          plugin_achievements: no

          # Streaks
          plugin_streak: yes
          
          # Lines of code
          plugin_lines: yes
          
          # Activity graph
          plugin_activity: no
          
          # Notable repos
          plugin_repositories: yes
          plugin_repositories_featured: Tazwar89/SoundWrapped,Tazwar89/StudyAssistant
          plugin_repositories_affiliations: owner
